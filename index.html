<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free, fast, and secure client-side web utility tools. Process PDFs, convert files, and manage track data completely in your browser.">
    <title>Web Tools - Free Browser Utilities</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="index.css">
    
    <!-- pdf-lib CDN for client-side PDF processing -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js" defer></script>
    <!-- JSZip CDN for ZIP archive creation -->
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js" defer></script>
    <!-- Chart.js & Zoom Plugin CDN for track timeline visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Hub Landing View -->
        <div id="hub-view" class="hub-container">
            <header class="app-header">
                <h1>Web Utility Tools</h1>
                <p>Free, fast, and private browser-based utilities. Your files never leave your computer.</p>
            </header>

            <div class="hub-controls">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="hub-search" placeholder="Search utility tools (e.g. merge, split, pdf)..." autocomplete="off">
                </div>
            </div>

            <main class="tools-grid" id="tools-grid">
                <!-- Dynamic tool cards -->
            </main>
        </div>

        <!-- Tool View Container -->
        <div id="tool-view" class="tool-view-container" style="display: none;">
            <nav class="tool-nav">
                <button class="back-btn" id="back-to-hub-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>All Tools</span>
                </button>
                <div class="breadcrumbs">
                    <span class="breadcrumb-root">Web Tools</span>
                    <span class="breadcrumb-separator">/</span>
                    <span id="breadcrumb-current" class="breadcrumb-active">Tool</span>
                </div>
            </nav>

            <main class="app-card" id="tool-workspace">
                <!-- Dynamic active tool workspace -->
            </main>
        </div>

        <footer class="app-footer">
            <p>100% Client-side processing. Fast, secure, and private.</p>
        </footer>
    </div>

    <!-- Modular Application Script -->
    <script type="module" src="js/core/App.js"></script>
</body>
</html>
